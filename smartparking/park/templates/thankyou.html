<!DOCTYPE html>
<html>
<head>
  <title>Thank You!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .container:nth-child(odd) {
      background-color: #ffe0b3; /* Light orange */
    }
    .container:nth-child(even) {
      background-color: #ccf2ff; /* Light blue */
    }
    .layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      text-align: center;
      color: #333;
    }
    .layer h2 {
      margin-top: 0;
      font-size: 24px;
    }
    .layer p {
      color: #666;
      line-height: 1.6;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .social-icons a {
      display: inline-block;
      width: 40px;
      height: 40px;
      background-color: #333;
      color: #fff;
      font-size: 24px;
      line-height: 40px;
      text-align: center;
      margin: 0 5px;
      border-radius: 50%;
      transition: background-color 0.3s ease;
    }
    .social-icons a:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="layer">
      <h2>Thank You!</h2>
      <p>Have a good day, sir.</p>
    </div>
  </div>

  <div class="container">
    <div class="layer">
      <h2>More Details About Smarking</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nulla vel scelerisque ligula, eu faucibus sapien. Sed vitae libero sed dolor placerat vulputate. Nulla ac tristique odio, vitae elementum ligula.</p>
    </div>
  </div>

  <div class="container">
    <div class="layer">
      <h2>Contact Us</h2>
      <div class="social-icons">
        <a href="#" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>
  </div>

</body>
</html>
