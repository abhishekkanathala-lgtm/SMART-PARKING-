<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Logs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }
        .container {
            width: 80%;
            max-width: 1000px;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Saved Vehicle Logs</h1>
        <table>
            <tr>
                <th>Vehicle No</th>
                <th>Name</th>
                <th>Phone No</th>
                <th>Date and Time</th>
                <th>Duration (in hours)</th>
            </tr>
            {% for log in logs %}
            <tr>
                <td>{{ log.vehicle_no }}</td>
                <td>{{ log.name }}</td>
                <td>{{ log.phone_no }}</td>
                <td>{{ log.date_and_time }}</td>
                <td>{{ log.duration }}</td>
            </tr>
            {% endfor %}
        </table>
        <a href="{% url 'details' %}">Add New Vehicle Log</a>
    </div>
</body>
</html>
